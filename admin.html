<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="page-shell">
    <section class="card" aria-labelledby="adminTitle">
      <header class="dashboard-top">
        <div>
          <p class="eyebrow">UNILAG MEDICAL CENTER</p>
          <h1 id="adminTitle">Admin Dashboard</h1>
        </div>

        <div class="action-bar">
          <button class="button button-secondary" type="button" onclick="window.location.href='queue.html'">Live Queue</button>
          <button class="button button-danger" type="button" onclick="clearQueue()">Clear Queue</button>
        </div>
      </header>

      <div id="adminQueue" class="admin-queue" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
