<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediQ</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-shell">
        <section class="card">
            <p class="eyebrow">MediQ</p>
            <p class="hero-tag">Fast, secure check-in for students and staff at your university clinic.</p>
            <h1>Clinic Check-In</h1>

            <div class="form-row">
                <input id="name" placeholder="Full Name"/>
                <input id="matric" placeholder="Matric Number"/>
                
                <div class="symptom-group">
                    <p class="group-title">What are your symptoms?</p>
                    <label>
                        <input type="checkbox" value="Fever" class="symptom-check"/>
                        <span>Fever</span>
                    </label>
                    
                    <label>
                        <input type="checkbox" value="Headache" class="symptom-check"/>
                        <span>Headache</span>
                    </label>
                    
                    <label>
                        <input type="checkbox" value="Injury" class="symptom-check"/>
                        <span>Injury</span>
                    </label>
                    
                    <label>
                        <input type="checkbox" value="Chest Pain" class="symptom-check"/>
                        <span>Chest Pain</span>
                    </label>
                    
                    <label>
                        <input type="checkbox" value="Difficulty Breathing" class="symptom-check"/>
                        <span>Difficulty Breathing</span>
                    </label>
                </div>
            </div>
            
            <textarea id="notes" placeholder="Describe how you feel..."></textarea>
            
            <button type="button" onclick="checkIn()">Submit</button>

            <div class="page-actions">
                <button type="button" onclick="window.location.href='queue.html'">View Live Queue</button>
                <button type="button" onclick="window.location.href='admin-login.html'">Admin Dashboard</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
