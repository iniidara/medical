<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNILAG Health Check-In</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-shell">
        <section class="card">
            <p class="eyebrow">UNILAG Health Check-In</p>
            <h1>Clinic Check-In</h1>

            <div class="form-row">
                <input id="name" placeholder="Your Name" />
                <select id="symptom">
                    <option>Fever</option>
                    <option>Headache</option>
                    <option>Injury</option>
                    <option>Other</option>
                </select>
                <button type="button" onclick="checkIn()">Submit</button>
            </div>

            <div id="result" aria-live="polite"></div>

            <div class="page-actions">
                <button type="button" onclick="window.location.href='queue.html'">View Live Queue</button>
                <button type="button" onclick="window.location.href='admin.html'">Admin Dashboard</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
